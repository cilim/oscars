services:
  - type: web
    name: oscars-pool
    runtime: ruby
    plan: free
    region: frankfurt
    buildCommand: bundle install && SECRET_KEY_BASE_DUMMY=1 bundle exec rails assets:precompile
    startCommand: bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0 -p $PORT
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false  # You will paste this value in the Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: oscars-db
          property: connectionString

databases:
  - name: oscars-db
    databaseName: oscars_production
    plan: free
    region: frankfurt
